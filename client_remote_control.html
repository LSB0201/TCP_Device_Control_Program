<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라즈베리파이 원격 제어</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { border: 2px solid #ccc; padding: 20px; border-radius: 10px; background-color: white; max-width: 600px; margin: auto; }
        .section { border: 1px solid #aaa; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        button { padding: 8px 15px; font-size: 16px; margin: 5px; cursor: pointer; border-radius: 5px; border: 1px solid #555; }
        .btn-on { background-color: #4CAF50; color: white; }
        .btn-off { background-color: #f44336; color: white; }
        .btn-stop-all { background-color: #000; color: white; font-weight: bold; width: 100%; padding: 15px; }
        input[type="number"] { padding: 8px; font-size: 16px; width: 60px; text-align: center; }
        .sensor-box { display: inline-block; width: 100px; height: 30px; border: 1px solid #000; vertical-align: middle; line-height: 30px; font-weight: bold; background-color: #eef; }
    </style>
    <script>
        // 서버로 제어 명령을 전송하는 비동기 함수 (화면 새로고침 없음)
        function sendCommand(cmd) {
            fetch('/api/cmd?' + cmd).catch(err => console.error(err));
        }

        // LED 로직 (꺼져있어도 밝기 조절 시 자동으로 켜짐)
        let ledState = false;
        function setLedPower(state) {
            ledState = state;
            sendCommand('led_power=' + (state ? '1' : '0'));
        }
        function setLedBrightness(val) {
            if (!ledState) setLedPower(true); // 전원이 꺼져있으면 먼저 켬
            sendCommand('led_pwm=' + val);
        }

        // 7-Segment 로직
        function startCountdown() {
            const num = document.getElementById('segInput').value;
            if (num >= 0 && num <= 9) sendCommand('seg_count=' + num);
            else alert("0~9 사이의 숫자를 입력하세요.");
        }

        // 센서 타이머 관리
        let lightTimer = null, tempTimer = null;

        function toggleLight(state) {
            if (state) {
                if (lightTimer) return;
                fetchSensor('light'); // 즉시 1회 실행
                lightTimer = setInterval(() => fetchSensor('light'), 3000);
            } else {
                clearInterval(lightTimer);
                lightTimer = null;
                document.getElementById('light_val').innerText = ''; // 칸 비우기
            }
        }

        function toggleTemp(state) {
            if (state) {
                if (tempTimer) return;
                fetchSensor('temp');
                tempTimer = setInterval(() => fetchSensor('temp'), 3000);
            } else {
                clearInterval(tempTimer);
                tempTimer = null;
                document.getElementById('temp_val').innerText = ''; // 칸 비우기
            }
        }

        function fetchSensor(type) {
            fetch('/api/sensor')
                .then(res => res.json())
                .then(data => {
                    if (type === 'light') document.getElementById('light_val').innerText = data.light;
                    if (type === 'temp') document.getElementById('temp_val').innerText = data.temp.toFixed(1);
                }).catch(err => console.error(err));
        }

        function stopAll() {
            toggleLight(false);
            toggleTemp(false);
            sendCommand('stop_all=1');
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>라즈베리파이 원격 제어</h2>
        
        <div class="section">
            <h3>LED</h3>
            <button class="btn-on" onclick="setLedPower(true)">ON</button>
            <button class="btn-off" onclick="setLedPower(false)">OFF</button>
            <br><br>
            <button onclick="setLedBrightness(25)">25%</button>
            <button onclick="setLedBrightness(50)">50%</button>
            <button onclick="setLedBrightness(75)">75%</button>
            <button onclick="setLedBrightness(100)">100%</button>
        </div>

        <div class="section">
            <h3>부저</h3>
            <button class="btn-on" onclick="sendCommand('buzzer=play')">ON</button>
            <button class="btn-off" onclick="sendCommand('buzzer=stop')">OFF</button>
        </div>

        <div class="section">
            <h3>7-Segment</h3>
            <input type="number" id="segInput" min="0" max="9" value="9">
            <button class="btn-on" onclick="startCountdown()">입력</button>
        </div>

        <div class="section">
            <h3>조도 센서 측정</h3>
            <div id="light_val" class="sensor-box"></div>
            <button class="btn-on" onclick="toggleLight(true)">측정 시작</button>
            <button class="btn-off" onclick="toggleLight(false)">측정 종료</button>
        </div>

        <div class="section">
            <h3>온도 센서 측정</h3>
            <div id="temp_val" class="sensor-box"></div>
            <button class="btn-on" onclick="toggleTemp(true)">측정 시작</button>
            <button class="btn-off" onclick="toggleTemp(false)">측정 종료</button>
        </div>

        <button class="btn-stop-all" onclick="stopAll()">전체 종료</button>
    </div>
</body>
</html>
