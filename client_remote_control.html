<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클라이언트 원격 제어 화면 구성</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f9f9f9; padding: 20px; }
        .container { 
            border: 2px solid #333; background-color: white; 
            max-width: 600px; margin: auto; padding: 30px; border-radius: 5px;
        }
        h2 { margin-top: 0; font-size: 24px; }
        .divider { height: 10px; background-color: #222; margin: 20px 0; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .control-group h3 { font-size: 20px; margin-bottom: 15px; }
        .control-group p { margin-bottom: 5px; font-weight: bold; color: #555; }
        
        button { 
            padding: 10px 20px; font-size: 16px; border: none; 
            border-radius: 10px; cursor: pointer; margin: 5px; font-weight: bold;
        }
        /* 첨부 이미지 색상 맞춤 */
        .btn-off { background-color: #ffcccc; color: #333; }
        .btn-on { background-color: #ccffcc; color: #333; }
        .btn-blue { background-color: #cce5ff; color: #333; }
        .btn-stop-all { background-color: #ffcccc; color: #333; width: 60%; padding: 15px; margin-top: 30px; font-size: 18px; }
        
        input[type="number"] { 
            padding: 10px; font-size: 16px; width: 120px; text-align: center; 
            border: 2px solid #333; border-radius: 5px; 
        }
        .sensor-box { 
            display: inline-block; width: 150px; height: 40px; border: 2px solid #333; 
            vertical-align: middle; line-height: 40px; font-weight: bold; font-size: 18px; text-align: center;
        }
    </style>
    <script>
        function sendCommand(cmd) {
            fetch('/api/cmd?' + cmd).catch(err => console.error(err));
        }

        // LED 전원 및 밝기 제어 (tcp_server.c의 led_pwm 명령어로 통일)
        let ledState = false;
        function setLedPower(state) {
            ledState = state;
            // On 이면 100%, Off 이면 0% 전송
            sendCommand('led_pwm=' + (state ? '100' : '0'));
        }
        function setLedBrightness(val) {
            ledState = true; 
            sendCommand('led_pwm=' + val);
        }

        function startCountdown() {
            const num = document.getElementById('segInput').value;
            if (num >= 0 && num <= 9 && num !== "") sendCommand('seg_count=' + num);
            else alert("0~9 사이의 숫자를 입력하세요.");
        }

        let lightTimer = null, tempTimer = null;

        function toggleLight(state) {
            if (state) {
                if (lightTimer) return;
                fetchSensor('light'); 
                lightTimer = setInterval(() => fetchSensor('light'), 3000);
            } else {
                clearInterval(lightTimer);
                lightTimer = null;
                document.getElementById('light_val').innerText = ''; 
            }
        }

        function toggleTemp(state) {
            if (state) {
                if (tempTimer) return;
                fetchSensor('temp');
                tempTimer = setInterval(() => fetchSensor('temp'), 3000);
            } else {
                clearInterval(tempTimer);
                tempTimer = null;
                document.getElementById('temp_val').innerText = ''; 
            }
        }

        function fetchSensor(type) {
            fetch('/api/sensor')
                .then(res => res.json())
                .then(data => {
                    if (type === 'light') document.getElementById('light_val').innerText = data.light;
                    if (type === 'temp') document.getElementById('temp_val').innerText = data.temp.toFixed(1);
                }).catch(err => console.error(err));
        }

        function stopAll() {
            toggleLight(false);
            toggleTemp(false);
            sendCommand('stop_all=1');
        }
    </script>
</head>
<body>
    <h2>클라이언트 원격 제어 화면 구성</h2>
    <div class="container">
        
        <div class="control-group">
            <h3>LED</h3>
            <div class="grid-2">
                <div>
                    <p>LED 전원</p>
                    <button class="btn-off" onclick="setLedPower(false)">Off</button>
                    <button class="btn-on" onclick="setLedPower(true)">On</button>
                    <button class="btn-blue" onclick="sendCommand('auto_led=1')">조도 자동 연동</button>
                </div>
                <div>
                    <p>LED 밝기 조절</p>
                    <button class="btn-blue" onclick="setLedBrightness(30)">최저</button>
                    <button class="btn-blue" onclick="setLedBrightness(60)">중간</button>
                    <button class="btn-blue" onclick="setLedBrightness(100)">최대</button>
                </div>
            </div>
        </div>

        <div class="divider"></div>

        <div class="grid-2 control-group">
            <div>
                <h3>부저</h3>
                <p>음악 제어</p>
                <button class="btn-off" onclick="sendCommand('buzzer=stop')">소리 Off</button>
                <button class="btn-on" onclick="sendCommand('buzzer=play')">소리 On</button>
            </div>
            <div>
                <h3>7세그먼트</h3>
                <p>전송할 숫자 입력(0 ~ 9)</p>
                <input type="number" id="segInput" min="0" max="9" placeholder="입력하는 곳">
                <button class="btn-blue" onclick="startCountdown()">입력 버튼</button>
            </div>
        </div>

        <div class="divider"></div>

        <div class="grid-2 control-group">
            <div>
                <h3>조도 센서</h3>
                <p>현재 조도 센서 값</p>
                <div id="light_val" class="sensor-box"> - </div>
                <br>
                <button class="btn-on" onclick="toggleLight(true)">측정 시작</button>
                <button class="btn-off" onclick="toggleLight(false)">측정 종료</button>
            </div>
            <div>
                <h3>온도 측정</h3>
                <p>현재 온도 값</p>
                <div id="temp_val" class="sensor-box"> - </div>
                <br>
                <button class="btn-on" onclick="toggleTemp(true)">측정 시작</button>
                <button class="btn-off" onclick="toggleTemp(false)">측정 종료</button>
            </div>
        </div>

        <div style="text-align: center;">
            <button class="btn-stop-all" onclick="stopAll()">전체 종료</button>
        </div>

    </div>
</body>
</html>
